<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vuora | Invoices Management</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" type="text/css" href="Vuora.css">
    <link rel="stylesheet" type="text/css" href="Invoices.css">

    

    <script>
        (function() {
            const savedTheme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', savedTheme);
        })();
    </script>
</head>
<body>

    <aside class="sidebar">
        <div class="sidebar-logo">VUORA</div>
        <nav class="menu">
            <a href="Vuora_Dashboard.html" class="menu-item">Overview</a>
            <a href="Vuora_Projects.html" class="menu-item">Projects</a>
            <a href="Vuora_Invoices" class="menu-item active">Invoices</a>
            <a href="Vuora_Wallet.html" class="menu-item">Wallet</a>
            <a href="Vuora_Settings.html" class="menu-item">Settings</a>
        </nav>
    </aside>

    <main class="main-content">
        <header class="header">
            <h1>Invoices Management</h1>
            <button class="btn-primary" onclick="toggleModal('addInvoiceModal', true)">+ Create Invoice</button>
        </header>

        <div class="filter-container">
            <button class="filter-btn active" onclick="handleFilter('all', this)">All</button>
            <button class="filter-btn" onclick="handleFilter('paid', this)">Paid</button>
            <button class="filter-btn" onclick="handleFilter('pending', this)">Pending</button>
            <button class="filter-btn" onclick="handleFilter('overdue', this)">Overdue</button>
        </div>

        <div class="table-container">
            <table id="invoiceTable">
                <thead>
                    <tr>
                        <th>Invoice ID</th>
                        <th>Client</th>
                        <th>Date</th>
                        <th>Amount</th>
                        <th>Status</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody>
                    <tr class="invoice-row" data-status="paid">
                        <td style="font-weight: 600;">#INV-2026-001</td>
                        <td>Fann Ceramics</td>
                        <td>Mar 05, 2026</td>
                        <td>$2,250.00</td>
                        <td><span class="status paid">Paid</span></td>
                        <td><button class="btn-download">Download</button></td>
                    </tr>
                    <tr class="invoice-row" data-status="pending">
                        <td style="font-weight: 600;">#INV-2026-002</td>
                        <td>Jazan Coffee App</td>
                        <td>Mar 08, 2026</td>
                        <td>$4,450.00</td>
                        <td><span class="status pending">Pending</span></td>
                        <td><button class="btn-download">Download</button></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>

    <div id="addInvoiceModal" class="modal">
        <div class="modal-content">
            <h2 style="font-family: 'Playfair Display', serif; margin-top: 0; font-size: 24px;">New Invoice</h2>
            
            <div class="input-group">
                <label>Client Name</label>
                <input type="text" id="clientNameInput" placeholder="e.g. Fann Ceramics">
            </div>
            
            <div class="input-group">
                <label>Contract Value ($)</label>
                <input type="number" id="amountInput" placeholder="4500">
            </div>

            <div class="input-group">
                <label>Payment Status</label>
                <select id="statusInput">
                    <option value="paid">Paid</option>
                    <option value="pending">Pending</option>
                    <option value="overdue">Overdue</option>
                </select>
            </div>

            <div class="input-group">
                <label>Invoice Date</label>
                <input type="date" id="invoiceDate">
            </div>

            <div style="display: flex; gap: 12px; margin-top: 10px;">
                <button onclick="toggleModal('addInvoiceModal', false)" style="flex: 1; padding: 12px; background: none; border: 1px solid var(--card-border); border-radius: 12px; cursor: pointer; color: var(--text-light);">Cancel</button>
                <button class="btn-primary" style="flex: 1;" onclick="processNewInvoice()">Create</button>
            </div>
        </div>
    </div>

    <script>
        
         
        
        function toggleModal(id, show) {
            const modal = document.getElementById(id);
            modal.style.display = show ? 'flex' : 'none';
            if(show) {
                document.getElementById('invoiceDate').value = new Date().toISOString().split('T')[0];
            }
        }

        function processNewInvoice() {
            const client = document.getElementById('clientNameInput').value;
            const amount = document.getElementById('amountInput').value;
            const status = document.getElementById('statusInput').value;
            const date = document.getElementById('invoiceDate').value;
            
            if(!client || !amount || !date) {
                alert("Please complete all fields.");
                return;
            }

            const formattedDate = new Date(date).toLocaleDateString('en-US', { 
                month: 'short', day: '2-digit', year: 'numeric' 
            });
            const invId = `#INV-2026-${Math.floor(100 + Math.random() * 899)}`;

            const tableBody = document.querySelector('#invoiceTable tbody');
            const row = document.createElement('tr');
            row.className = "invoice-row";
            row.setAttribute('data-status', status);

            row.innerHTML = `
                <td style="font-weight: 600;">${invId}</td>
                <td>${client}</td>
                <td>${formattedDate}</td>
                <td>$${parseFloat(amount).toLocaleString()}</td>
                <td><span class="status ${status}">${status}</span></td>
                <td><button class="btn-download">Download</button></td>
            `;

            tableBody.prepend(row);
            toggleModal('addInvoiceModal', false);
            resetForm();
        }

        function resetForm() {
            document.getElementById('clientNameInput').value = "";
            document.getElementById('amountInput').value = "";
        }

        function handleFilter(status, btn) {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');

            document.querySelectorAll('.invoice-row').forEach(row => {
                const rowStatus = row.getAttribute('data-status');
                row.style.display = (status === 'all' || rowStatus === status) ? '' : 'none';
            });
        }
    </script>
</body>
</html>
