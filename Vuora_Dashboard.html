<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vuora | Dashboard</title>
    
    <link rel="stylesheet" href="Vuora.css">
    <link rel="stylesheet" href="Dashboard.css">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <script>
        (function() {
            if (localStorage.getItem('theme') === 'dark') {
                document.documentElement.setAttribute('data-theme', 'dark');
            }
        })();
    </script>
</head>
<body>

    <aside class="sidebar">
        <div class="sidebar-logo">VUORA</div>
        <nav class="menu">
            <a href="Vuora_Dashboard.html" class="menu-item active">Overview</a>
            <a href="Vuora_Projects.html" class="menu-item">Projects</a>
            <a href="Vuora_Invoices.html" class="menu-item">Invoices</a>
            <a href="Vuora_Wallet.html" class="menu-item">Wallet</a>
            <a href="Vuora_Settings.html" class="menu-item">Settings</a>
        </nav>
    </aside>

    <main class="main-content">
        <header class="page-header">
            <div class="welcome-section">
                <h1>Welcome, Leora</h1>
                <p class="date-display">Thursday, March 12, 2026</p>
            </div>
        </header>

        <section class="stats-grid">
            <div class="stat-card">
                <span class="card-label">Total Earnings</span>
                <span class="card-value">$24,500.00</span>
                <span class="status text-success">↑ 12% from last month</span>
            </div>
            
            <div class="stat-card">
                <span class="card-label">Active Projects</span>
                <span class="card-value">12</span>
                <span class="status text-muted">4 awaiting feedback</span>
            </div>
            
            <div class="stat-card">
                <span class="card-label">Pending Payments</span>
                <span class="card-value">$3,200.00</span>
                <span class="status text-danger">2 invoices overdue</span>
            </div>
        </section>

        <section class="chart-container">
            <h3 class="chart-title">Revenue Growth</h3>
            <div class="canvas-wrapper">
                <canvas id="revenueChart"></canvas>
            </div>
        </section>
    </main>

    <script>
        const ctx = document.getElementById('revenueChart').getContext('2d');
        const gradient = ctx.createLinearGradient(0, 0, 0, 400);
        gradient.addColorStop(0, 'rgba(76, 201, 240, 0.3)');
        gradient.addColorStop(1, 'rgba(76, 201, 240, 0)');

        new Chart(ctx, {
            type: 'line',
            data: {
                labels: ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun'],
                datasets: [{
                    label: 'Monthly Revenue',
                    data: [12000, 19000, 15000, 25000, 22000, 30000],
                    borderColor: '#4cc9f0',
                    borderWidth: 3,
                    fill: true,
                    backgroundColor: gradient,
                    tension: 0.4,
                    pointRadius: 4,
                    pointBackgroundColor: '#4cc9f0',
                    pointBorderColor: 'transparent',
                    pointHoverRadius: 6
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: {
                    x: { 
                        grid: { display: false }, 
                        ticks: { color: '#94A3B8', font: { family: 'Inter' } } 
                    },
                    y: { 
                        beginAtZero: true, 
                        grid: { color: 'rgba(148, 163, 184, 0.1)' }, 
                        ticks: { 
                            color: '#94A3B8',
                            callback: function(value) { return '$' + value.toLocaleString(); }
                        } 
                    }
                }
            }
        });
    </script>
</body>
</html>
